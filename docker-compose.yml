services:
  db:
    image: postgres:16
    container_name: pulsewatch_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pulsewatch_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pulsewatch_pgdata:
